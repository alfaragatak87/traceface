name: traceface
description: TraceFace - Sistem Biometrik Pencarian Orang Hilang
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # ════════════════════════════════════════════════════════
  #  DATABASE LOKAL
  #  Semua data disimpan di SQLite lokal pada HP
  # ════════════════════════════════════════════════════════

  # SQLite database lokal — pengganti Firestore
  # Dipakai di: lib/data/database_helper.dart
  #             lib/data/local_repository.dart
  sqflite: ^2.3.3+2

  # ════════════════════════════════════════════════════════
  #  KEAMANAN
  # ════════════════════════════════════════════════════════

  # Hash password untuk autentikasi lokal
  # Dipakai di: lib/services/auth_service.dart
  crypto: ^3.0.3

  # ════════════════════════════════════════════════════════
  #  KAMERA & FOTO
  # ════════════════════════════════════════════════════════

  # Pilih foto dari galeri atau ambil dengan kamera
  # Dipakai di: lib/pages/report_page.dart
  image_picker: ^1.1.2

  # ════════════════════════════════════════════════════════
  #  NOTIFIKASI LOKAL
  #  Tampil di HP bahkan saat app di-background
  # ════════════════════════════════════════════════════════
  flutter_local_notifications: ^17.1.2

  # ════════════════════════════════════════════════════════
  #  UTILITAS
  # ════════════════════════════════════════════════════════

  # Simpan sesi login di storage HP
  # Dipakai di: lib/services/auth_service.dart
  shared_preferences: ^2.2.3

  # Format tanggal Indonesia
  intl: ^0.19.0

  # UUID untuk ID kasus lokal
  uuid: ^4.4.0

  # Icon
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.6

  # Utility path untuk storage_service.dart & database
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
